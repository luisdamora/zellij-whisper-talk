name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          # Keep release builds in their own cache slot, separate from any
          # future debug/test jobs that share the registry.
          key: wasm32-wasip1-release

      - name: Build WASM
        run: cargo build --release --locked --target wasm32-wasip1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/wasm32-wasip1/release/zellij_whisper_talk.wasm
            scripts/transcribe.py
            scripts/install.sh
          generate_release_notes: true
